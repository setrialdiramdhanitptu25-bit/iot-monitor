<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard IoT</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

/* CARD */
.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:15px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:15px;
  width:150px;
}

.danger { background:red !important; }
.safe { background:green !important; }

/* CHART */
.chart-box {
  width:95%;
  max-width:900px;
  margin:20px auto;
  background:#1e293b;
  padding:15px;
  border-radius:15px;

  height:300px;        /* 🔥 FIX */
  overflow:hidden;
}

canvas {
  width:100% !important;
  height:100% !important;
}

/* MOBILE */
@media(max-width:600px){
  .card { width:100%; }
}
</style>
</head>

<body>

<h2>🔥 Dashboard IoT</h2>

<div class="container">
  <div class="card"><h3>Suhu</h3><div id="suhu"></div></div>
  <div class="card"><h3>Humidity</h3><div id="hum"></div></div>
  <div class="card" id="gasCard"><h3>Gas</h3><div id="gas"></div></div>
</div>

<h3>Keterangan Gas</h3>
<p>
0–100 Bersih<br>
100–300 Normal<br>
300–600 Terdeteksi Gas<br>
>600 Bahaya
</p>

<!-- 🔥 GRAFIK -->
<div class="chart-box">
  <h3>Grafik Suhu</h3>
  <canvas id="chartSuhu"></canvas>
</div>

<div class="chart-box">
  <h3>Grafik Humidity</h3>
  <canvas id="chartHum"></canvas>
</div>

<div class="chart-box">
  <h3>Grafik Gas</h3>
  <canvas id="chartGas"></canvas>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxo_vsg6_AbjO8HAYupSaxccX-4ecH2MYqK4pJWUarwctjkqJdzOPvwfUI3L-RpaYxsoA/exec";

let chartSuhu, chartHum, chartGas;

function createChart(id,label,data,labels){
  return new Chart(document.getElementById(id),{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:label,
        data:data,
        borderWidth:2,
        tension:0.3
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      interaction:{
        mode:'nearest',
        intersect:false
      },
      plugins:{
        zoom:{
          pan:{
            enabled:true,
            mode:'x',
            modifierKey:'ctrl'
          },
          zoom:{
            wheel:{
              enabled:true,
              modifierKey:'ctrl'
            },
            pinch:{
              enabled:true
            },
            mode:'x'
          }
        }
      }
    }
  });
}

function load(){
 fetch(url)
 .then(r=>r.json())
 .then(data=>{

  if(data.length === 0) return;

  let last = data[data.length-1];

  document.getElementById("suhu").innerText = last.suhu+" °C";
  document.getElementById("hum").innerText = last.hum+" %";
  document.getElementById("gas").innerText = last.gas+" ("+last.status+")";

  let gasCard = document.getElementById("gasCard");
  if(last.gas > 600){ gasCard.className="card danger"; }
  else{ gasCard.className="card safe"; }

  let suhu=[], hum=[], gas=[], waktu=[];

  data.slice(-30).forEach(d=>{
    suhu.push(Number(d.suhu));
    hum.push(Number(d.hum));
    gas.push(Number(d.gas));
    waktu.push(d.waktu);
  });

  if(chartSuhu) chartSuhu.destroy();
  if(chartHum) chartHum.destroy();
  if(chartGas) chartGas.destroy();

  chartSuhu = createChart("chartSuhu","Suhu (°C)",suhu,waktu);
  chartHum = createChart("chartHum","Humidity (%)",hum,waktu);
  chartGas = createChart("chartGas","Gas Level",gas,waktu);

 })
 .catch(err=>{
   console.log("Error:", err);
 });
}

load();
setInterval(load,3000);
</script>

</body>
</html>
