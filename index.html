<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

<script>
const url = "https://script.google.com/macros/s/AKfycbxo_vsg6_AbjO8HAYupSaxccX-4ecH2MYqK4pJWUarwctjkqJdzOPvwfUI3L-RpaYxsoA/exec";

let chartSuhu, chartHum, chartGas;

// 🔥 WAJIB REGISTER (INI YANG SERING LUPA)
Chart.register(ChartDataLabels);

function createChart(id,label,data,labels,yMin,yMax,yStep){
  return new Chart(document.getElementById(id),{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:label,
        data:data,
        borderWidth:2,
        tension:0.3,
        pointRadius:4
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{
        y:{
          min:yMin,
          max:yMax,
          ticks:{
            stepSize:yStep
          }
        }
      },
      plugins:{
        datalabels:{
          color:'white',
          anchor:'end',
          align:'top',
          formatter:(v)=>v
        },
        zoom:{
          pan:{
            enabled:true,
            mode:'x',
            modifierKey:'ctrl'
          },
          zoom:{
            wheel:{
              enabled:true,
              modifierKey:'ctrl'
            },
            pinch:{ enabled:true },
            mode:'x'
          }
        }
      }
    }
  });
}

function load(){
 fetch(url)
 .then(r=>r.json())
 .then(data=>{

  if(!data || data.length === 0) return;

  let last = data[data.length-1];

  document.getElementById("suhu").innerText = last.suhu+" °C";
  document.getElementById("hum").innerText = last.hum+" %";
  document.getElementById("gas").innerText = last.gas+" ("+last.status+")";

  let gasCard = document.getElementById("gasCard");
  gasCard.className = (last.gas > 600) ? "card danger" : "card safe";

  let suhu=[], hum=[], gas=[], waktu=[];

  data.slice(-30).forEach(d=>{
    suhu.push(Number(d.suhu));
    hum.push(Number(d.hum));
    gas.push(Number(d.gas));
    waktu.push(d.waktu);
  });

  if(chartSuhu) chartSuhu.destroy();
  if(chartHum) chartHum.destroy();
  if(chartGas) chartGas.destroy();

  chartSuhu = createChart("chartSuhu","Suhu",suhu,waktu,15,50,5);
  chartHum  = createChart("chartHum","Humidity",hum,waktu,50,90,10);
  chartGas  = createChart("chartGas","Gas",gas,waktu,50,800,100);

 })
 .catch(err=>{
   console.log("ERROR:", err);
 });
}

load();
setInterval(load,3000);
</script>
