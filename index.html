<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<script>
const url = "https://script.google.com/macros/s/AKfycbxo_vsg6_AbjO8HAYupSaxccX-4ecH2MYqK4pJWUarwctjkqJdzOPvwfUI3L-RpaYxsoA/exec";

let chartSuhu, chartHum, chartGas;

function createChart(id,label,data,labels,yMin,yMax,yStep){
  return new Chart(document.getElementById(id),{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:label,
        data:data,
        borderWidth:2,
        tension:0.3,
        pointRadius:4
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{
        y:{
          min:yMin,
          max:yMax,
          ticks:{
            stepSize:yStep
          }
        }
      },
      plugins:{
        datalabels:{
          color:'white',
          anchor:'end',
          align:'top',
          formatter:(value)=> value
        },
        zoom:{
          pan:{
            enabled:true,
            mode:'x',
            modifierKey:'ctrl'
          },
          zoom:{
            wheel:{
              enabled:true,
              modifierKey:'ctrl'
            },
            pinch:{
              enabled:true
            },
            mode:'x'
          }
        }
      }
    },
    plugins:[ChartDataLabels]
  });
}

function load(){
 fetch(url)
 .then(r=>r.json())
 .then(data=>{

  if(data.length === 0) return;

  let last = data[data.length-1];

  document.getElementById("suhu").innerText = last.suhu+" °C";
  document.getElementById("hum").innerText = last.hum+" %";
  document.getElementById("gas").innerText = last.gas+" ("+last.status+")";

  let gasCard = document.getElementById("gasCard");
  if(last.gas > 600){ gasCard.className="card danger"; }
  else{ gasCard.className="card safe"; }

  let suhu=[], hum=[], gas=[], waktu=[];

  data.slice(-30).forEach(d=>{
    suhu.push(Number(d.suhu));
    hum.push(Number(d.hum));
    gas.push(Number(d.gas));
    waktu.push(d.waktu);
  });

  if(chartSuhu) chartSuhu.destroy();
  if(chartHum) chartHum.destroy();
  if(chartGas) chartGas.destroy();

  // 🔥 SUHU (15–50 step 5)
  chartSuhu = createChart(
    "chartSuhu",
    "Suhu (°C)",
    suhu,
    waktu,
    15,50,5
  );

  // 🔥 HUM (50–90 step 10)
  chartHum = createChart(
    "chartHum",
    "Humidity (%)",
    hum,
    waktu,
    50,90,10
  );

  // 🔥 GAS (50–800 step 100)
  chartGas = createChart(
    "chartGas",
    "Gas Level",
    gas,
    waktu,
    50,800,100
  );

 })
 .catch(err=>{
   console.log("Error:", err);
 });
}

load();
setInterval(load,3000);
</script>
