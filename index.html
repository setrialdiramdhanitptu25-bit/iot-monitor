<!DOCTYPE html>
<html>
<head>
  <title>Dashboard IoT PRO</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { background:#0f172a; color:white; text-align:center; font-family:Arial; }
    .container { display:flex; justify-content:center; gap:20px; margin:20px; flex-wrap:wrap; }
    .card { background:#1e293b; padding:20px; border-radius:15px; width:150px; }
    .danger { background:red !important; }
    .safe { background:green !important; }

    table { margin:auto; border-collapse:collapse; }
    th,td { border:1px solid white; padding:8px; }
  </style>
</head>

<body>

<h1>🔥 Dashboard IoT PRO</h1>

<div class="container">
  <div class="card"><h3>Suhu</h3><div id="suhu">-</div></div>
  <div class="card"><h3>Humidity</h3><div id="hum">-</div></div>
  <div class="card" id="gasCard"><h3>Gas</h3><div id="gas">-</div></div>
</div>

<h3>Interval (detik)</h3>
<input type="number" id="interval" value="5">
<button onclick="setIntervalData()">SET</button>

<br><br>
<button onclick="startLog()">START</button>
<button onclick="stopLog()">STOP</button>

<h2>📊 Data</h2>

<table>
<tr><th>Waktu</th><th>Suhu</th><th>Hum</th><th>Gas</th><th>Status</th></tr>
<tbody id="data"></tbody>
</table>

<canvas id="chart1"></canvas>
<canvas id="chart2"></canvas>

<script>
const url = "https://script.google.com/macros/s/AKfycbxo_vsg6_AbjO8HAYupSaxccX-4ecH2MYqK4pJWUarwctjkqJdzOPvwfUI3L-RpaYxsoA/exec";

let chart1, chart2;

function loadData(){
 fetch(url)
 .then(res=>res.json())
 .then(data=>{

  let table = document.getElementById("data");
  table.innerHTML="";

  let suhuArr=[], humArr=[], gasArr=[], waktuArr=[];

  let last = data[data.length-1];

  document.getElementById("suhu").innerText = last.suhu;
  document.getElementById("hum").innerText = last.hum;
  document.getElementById("gas").innerText = last.gas;

  let gasCard = document.getElementById("gasCard");

  if(last.gas > 700){
    gasCard.className="card danger";
  } else if(last.gas > 400){
    gasCard.style.background="orange";
  } else {
    gasCard.className="card safe";
  }

  data.slice(-20).forEach(d=>{
    table.innerHTML += `
    <tr>
      <td>${d.waktu}</td>
      <td>${d.suhu}</td>
      <td>${d.hum}</td>
      <td>${d.gas}</td>
      <td>${d.status}</td>
    </tr>`;

    suhuArr.push(d.suhu);
    humArr.push(d.hum);
    gasArr.push(d.gas);
    waktuArr.push(d.waktu);
  });

  if(chart1) chart1.destroy();
  if(chart2) chart2.destroy();

  chart1 = new Chart(document.getElementById("chart1"), {
    type: "line",
    data: {
      labels: waktuArr,
      datasets: [
        { label: "Suhu", data: suhuArr },
        { label: "Humidity", data: humArr }
      ]
    }
  });

  chart2 = new Chart(document.getElementById("chart2"), {
    type: "line",
    data: {
      labels: waktuArr,
      datasets: [
        { label: "Gas", data: gasArr }
      ]
    }
  });

 });
}

function setIntervalData(){
 fetch(url+"?mode=set&interval="+document.getElementById("interval").value);
}

function startLog(){
 fetch(url+"?mode=set&logging=1");
}

function stopLog(){
 fetch(url+"?mode=set&logging=0");
}

loadData();
setInterval(loadData,3000);
</script>

</body>
</html>
