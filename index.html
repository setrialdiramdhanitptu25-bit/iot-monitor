<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romantic Love</title>
<style>
  body {
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    color:white;
    text-align:center;
  }

  h1, h2 {
    margin:0.2em;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
  }

  h1 {
    font-size:4em;
    animation: pulse 2s infinite;
  }

  h2 {
    font-size:2.5em;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity:1; }
    50% { transform: scale(1.1); opacity:0.9; }
    100% { transform: scale(1); opacity:1; }
  }

  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
  }

  .heart {
    position:absolute;
    font-size:24px;
    color:red;
    animation: fall linear;
  }

  @keyframes fall {
    0% { transform: translateY(-50px) rotate(0deg); opacity:1; }
    100% { transform: translateY(100vh) rotate(360deg); opacity:0; }
  }

</style>
</head>
<body>

<div>
  <h1>I <span class="pulse-heart">❤</span> You</h1>
  <h2>I Miss You <span class="pulse-heart">❤</span></h2>
</div>

<script>
  // Fungsi membuat hati jatuh
  function createHeart() {
    const heart = document.createElement('div');
    heart.classList.add('heart');
    heart.style.left = Math.random() * window.innerWidth + 'px';
    heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
    heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
    document.body.appendChild(heart);
    heart.innerText = '❤';
    setTimeout(() => {
      heart.remove();
    }, 5000);
  }

  // Hati jatuh tiap 300ms
  setInterval(createHeart, 300);

  // Teks hati pulse
  const pulseHearts = document.querySelectorAll('.pulse-heart');
  setInterval(() => {
    pulseHearts.forEach(h => {
      h.style.opacity = Math.random() * 0.5 + 0.5;
    });
  }, 500);
</script>

</body>
</html>
