<!DOCTYPE html>
<html>
<head>
  <title>Dashboard IoT PRO</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    .card {
      display:inline-block;
      background:#1e293b;
      padding:20px;
      margin:10px;
      border-radius:15px;
      width:150px;
    }

    .danger { background:red !important; }
    .safe { background:green !important; }

    table {
      margin:auto;
      border-collapse:collapse;
    }

    th,td {
      border:1px solid white;
      padding:8px;
    }
  </style>
</head>

<body>

<h1>🔥 Dashboard IoT PRO</h1>

<!-- CONTROL -->
<input type="number" id="interval" value="5">
<button onclick="setIntervalESP()">SET</button>
<button onclick="startLog()">START</button>
<button onclick="stopLog()">STOP</button>

<br><br>

<!-- CARD -->
<div class="card"><h3>Suhu</h3><div id="suhu">-</div></div>
<div class="card"><h3>Hum</h3><div id="hum">-</div></div>
<div class="card" id="gasCard"><h3>Gas</h3><div id="gas">-</div></div>

<h2>Data</h2>

<table>
<tr><th>Waktu</th><th>Suhu</th><th>Hum</th><th>Gas</th></tr>
<tbody id="data"></tbody>
</table>

<canvas id="chart"></canvas>

<script>

const url = "https://script.google.com/macros/s/AKfycbzfrY77J6LFkPUlfL6eUuMQb-vORkHdPY5HEYdnI5wanNc_9HuI6rvspGNd9ALKMUpNdQ/exec";

let chart;

function setIntervalESP(){
  let val = document.getElementById("interval").value;
  fetch(url+"?mode=set&interval="+val);
}

function startLog(){
  fetch(url+"?mode=set&logging=1");
}

function stopLog(){
  fetch(url+"?mode=set&logging=0");
}

function loadData(){
 fetch(url)
 .then(res=>res.json())
 .then(data=>{

  if(data.length==0) return;

  let table = document.getElementById("data");
  table.innerHTML="";

  let suhuArr=[], humArr=[], gasArr=[], waktuArr=[];

  let last = data[data.length-1];

  document.getElementById("suhu").innerText = last.suhu+" °C";
  document.getElementById("hum").innerText = last.hum+" %";
  document.getElementById("gas").innerText = last.gas;

  let gasCard = document.getElementById("gasCard");

  if(last.gas>600){
    gasCard.classList.add("danger");
    gasCard.classList.remove("safe");
  } else {
    gasCard.classList.add("safe");
    gasCard.classList.remove("danger");
  }

  data.slice(-20).forEach(d=>{
    table.innerHTML+=`
    <tr>
    <td>${d.waktu}</td>
    <td>${d.suhu}</td>
    <td>${d.hum}</td>
    <td>${d.gas}</td>
    </tr>`;

    suhuArr.push(d.suhu);
    humArr.push(d.hum);
    gasArr.push(d.gas);
    waktuArr.push(d.waktu);
  });

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:waktuArr,
      datasets:[
        {label:"Suhu", data:suhuArr},
        {label:"Humidity", data:humArr},
        {label:"Gas", data:gasArr}
      ]
    }
  });

 });
}

setInterval(loadData,3000);
loadData();

</script>

</body>
</html>
