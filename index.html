<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard IoT</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.container {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
}

.card {
  background:#1e293b;
  padding:10px;
  border-radius:10px;
  width:120px;
}

.chart-box {
  width:95%;
  max-width:800px;
  height:300px;
  margin:20px auto;
  background:#1e293b;
  border-radius:10px;
}

canvas {
  width:100% !important;
  height:100% !important;
}
</style>
</head>

<body>

<h2>Dashboard IoT</h2>

<div class="container">
  <div class="card"><h4>Suhu</h4><div id="suhu">-</div></div>
  <div class="card"><h4>Hum</h4><div id="hum">-</div></div>
  <div class="card"><h4>Gas</h4><div id="gas">-</div></div>
</div>

<div class="chart-box"><canvas id="chartSuhu"></canvas></div>
<div class="chart-box"><canvas id="chartHum"></canvas></div>
<div class="chart-box"><canvas id="chartGas"></canvas></div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxo_vsg6_AbjO8HAYupSaxccX-4ecH2MYqK4pJWUarwctjkqJdzOPvwfUI3L-RpaYxsoA/exec";

let chart1, chart2, chart3;

function buatChart(id, data, label, min, max, step){
  return new Chart(document.getElementById(id),{
    type:'line',
    data:{
      labels:data.map(d=>d.waktu),
      datasets:[{
        label:label,
        data:data.map(d=>Number(d.value)),
        borderWidth:2
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      scales:{
        y:{
          min:min,
          max:max,
          ticks:{ stepSize:step }
        }
      }
    }
  });
}

function loadData(){
 fetch(url)
 .then(res=>res.json())
 .then(data=>{

  if(!data || data.length==0) return;

  let last = data[data.length-1];

  document.getElementById("suhu").innerText = last.suhu;
  document.getElementById("hum").innerText = last.hum;
  document.getElementById("gas").innerText = last.gas;

  let suhuData = data.slice(-20).map(d=>({waktu:d.waktu, value:d.suhu}));
  let humData  = data.slice(-20).map(d=>({waktu:d.waktu, value:d.hum}));
  let gasData  = data.slice(-20).map(d=>({waktu:d.waktu, value:d.gas}));

  if(chart1) chart1.destroy();
  if(chart2) chart2.destroy();
  if(chart3) chart3.destroy();

  chart1 = buatChart("chartSuhu", suhuData, "Suhu", 15,50,5);
  chart2 = buatChart("chartHum", humData, "Humidity", 50,90,10);
  chart3 = buatChart("chartGas", gasData, "Gas", 50,800,100);

 })
 .catch(err=>console.log(err));
}

window.onload = function(){
  loadData();
  setInterval(loadData,3000);
}
</script>

</body>
</html>
