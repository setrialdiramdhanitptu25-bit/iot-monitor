<!DOCTYPE html>
<html>
<head>
  <title>Dashboard IoT PRO</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body { background:#0f172a; color:white; text-align:center; font-family:Arial; }

    .container {
      display:flex;
      justify-content:center;
      gap:20px;
      margin:20px;
      flex-wrap:wrap;
    }

    .card {
      background:#1e293b;
      padding:20px;
      border-radius:15px;
      width:150px;
    }

    .danger { background:red !important; }
    .safe { background:green !important; }

    /* 🔥 SCROLL TABLE */
    #tableContainer {
      max-height: 400px;
      overflow-y: auto;
      margin-top: 40px;
    }

    table {
      margin:auto;
      border-collapse:collapse;
      width:90%;
    }

    th,td {
      border:1px solid white;
      padding:8px;
    }

    canvas {
      max-width: 90%;
      margin-top: 30px;
    }
  </style>
</head>

<body>

<h1>🔥 Dashboard IoT PRO</h1>

<div class="container">
  <div class="card"><h3>Suhu</h3><div id="suhu">-</div></div>
  <div class="card"><h3>Humidity</h3><div id="hum">-</div></div>
  <div class="card" id="gasCard"><h3>Gas</h3><div id="gas">-</div></div>
</div>

<h3>Status Logging: <span id="logStatus">-</span></h3>

<h3>Interval (detik)</h3>
<input type="number" id="interval" value="5">
<button onclick="setIntervalData()">SET</button>

<br><br>
<button onclick="startLog()">START</button>
<button onclick="stopLog()">STOP</button>
<button onclick="resetData()">RESET</button>

<h2>📈 Grafik Suhu & Humidity</h2>
<canvas id="chart1"></canvas>

<h2>📈 Grafik Gas</h2>
<canvas id="chart2"></canvas>

<h2>📊 Data Lengkap (Scroll)</h2>

<div id="tableContainer">
<table>
<thead>
<tr>
  <th>Waktu</th>
  <th>Suhu</th>
  <th>Hum</th>
  <th>Gas</th>
  <th>Status</th>
</tr>
</thead>
<tbody id="data"></tbody>
</table>
</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbxo_vsg6_AbjO8HAYupSaxccX-4ecH2MYqK4pJWUarwctjkqJdzOPvwfUI3L-RpaYxsoA/exec";

let chart1, chart2;

function loadData(){
 fetch(url)
 .then(res=>res.json())
 .then(data=>{

  if(data.length == 0) return;

  let table = document.getElementById("data");
  table.innerHTML="";

  let suhuArr=[], humArr=[], gasArr=[], waktuArr=[];

  let last = data[data.length-1];

  // CARD
  document.getElementById("suhu").innerText = last.suhu + " °C";
  document.getElementById("hum").innerText = last.hum + " %";
  document.getElementById("gas").innerText = last.gas;

  let gasCard = document.getElementById("gasCard");

  gasCard.classList.remove("danger","safe");
  gasCard.style.background="";

  if(last.gas > 1800){
    gasCard.className="card danger";
  } else if(last.gas > 1200){
    gasCard.style.background="orange";
  } else {
    gasCard.className="card safe";
  }

  // 🔥 TAMPILKAN SEMUA DATA
  data.forEach(d=>{
    table.innerHTML += `
    <tr>
      <td>${d.waktu}</td>
      <td>${d.suhu}</td>
      <td>${d.hum}</td>
      <td>${d.gas}</td>
      <td>${d.status}</td>
    </tr>`;
  });

  // 🔥 AUTO SCROLL KE BAWAH
  let container = document.getElementById("tableContainer");
  container.scrollTop = container.scrollHeight;

  // 🔥 GRAFIK (AMBIL 20 TERAKHIR)
  let lastData = data.slice(-20);

  lastData.forEach(d=>{
    suhuArr.push(Number(d.suhu));
    humArr.push(Number(d.hum));
    gasArr.push(Number(d.gas));
    waktuArr.push(d.waktu);
  });

  if(chart1) chart1.destroy();
  if(chart2) chart2.destroy();

  chart1 = new Chart(document.getElementById("chart1"), {
    type: "line",
    data: {
      labels: waktuArr,
      datasets: [
        { label: "Suhu", data: suhuArr },
        { label: "Humidity", data: humArr }
      ]
    }
  });

  chart2 = new Chart(document.getElementById("chart2"), {
    type: "line",
    data: {
      labels: waktuArr,
      datasets: [
        { label: "Gas", data: gasArr }
      ]
    }
  });

 });
}

// CONTROL
function setIntervalData(){
 fetch(url+"?mode=set&interval="+document.getElementById("interval").value);
}

function startLog(){
 fetch(url+"?mode=set&logging=1");
 document.getElementById("logStatus").innerText = "AKTIF";
}

function stopLog(){
 fetch(url+"?mode=set&logging=0");
 document.getElementById("logStatus").innerText = "NONAKTIF";
}

function resetData(){
 if(confirm("Reset semua data?")){
   fetch(url+"?mode=reset")
   .then(()=>alert("Data direset"));
 }
}

// AUTO REFRESH
loadData();
setInterval(loadData,3000);
</script>

</body>
</html>
