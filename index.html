<!DOCTYPE html>
<html>
<head>
  <title>Dashboard IoT PRO</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      text-align: center;
      font-family: Arial;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 150px;
      transition: 0.3s;
    }

    .danger { 
      background: red !important; 
      animation: blink 1s infinite;
    }

    .safe { 
      background: green !important; 
    }

    @keyframes blink {
      50% { opacity: 0.3; }
    }

    table {
      margin: auto;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid white;
      padding: 8px;
    }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    button {
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🔥 Dashboard IoT PRO</h1>

<!-- 🔧 CONTROL -->
<div>
  <input type="number" id="interval" value="5" placeholder="Interval (detik)">
  <button onclick="setIntervalESP()">SET INTERVAL</button>
  <button onclick="startLog()">START</button>
  <button onclick="stopLog()">STOP</button>
</div>

<!-- 📊 CARD -->
<div class="container">
  <div class="card">
    <h3>Suhu</h3>
    <div id="suhu">-</div>
  </div>

  <div class="card">
    <h3>Humidity</h3>
    <div id="hum">-</div>
  </div>

  <div class="card" id="gasCard">
    <h3>Gas</h3>
    <div id="gas">-</div>
  </div>
</div>

<h2>📊 Data Rata-rata (per 10)</h2>

<table>
<tr>
<th>Waktu</th>
<th>Suhu</th>
<th>Hum</th>
<th>Gas</th>
</tr>
<tbody id="data"></tbody>
</table>

<br>
<canvas id="chart"></canvas>

<script>

const url = "https://script.google.com/macros/s/AKfycbzfrY77J6LFkPUlfL6eUuMQb-vORkHdPY5HEYdnI5wanNc_9HuI6rvspGNd9ALKMUpNdQ/exec";

let chart;

// 🔧 SET INTERVAL
function setIntervalESP(){
  let val = document.getElementById("interval").value;

  fetch(url + "?mode=set&interval=" + val)
  .then(()=> alert("Interval diubah ke " + val + " detik"));
}

// ▶️ START
function startLog(){
  fetch(url + "?mode=set&logging=1")
  .then(()=> alert("Logging START"));
}

// ⏹️ STOP
function stopLog(){
  fetch(url + "?mode=set&logging=0")
  .then(()=> alert("Logging STOP"));
}

// 📊 AVERAGE DATA
function averageData(data, size=10){
  let result = [];

  for(let i=0; i<data.length; i+=size){
    let chunk = data.slice(i, i+size);

    let suhu=0, hum=0, gas=0;

    chunk.forEach(d=>{
      suhu += parseFloat(d.suhu);
      hum += parseFloat(d.hum);
      gas += parseFloat(d.gas);
    });

    result.push({
      waktu: chunk[chunk.length-1].waktu,
      suhu: (suhu/chunk.length).toFixed(2),
      hum: (hum/chunk.length).toFixed(2),
      gas: (gas/chunk.length).toFixed(0)
    });
  }

  return result;
}

// 🔄 LOAD DATA
function loadData(){
 fetch(url)
 .then(res=>res.json())
 .then(raw=>{

  if(raw.length == 0) return;

  let data = averageData(raw, 10);

  let table = document.getElementById("data");
  table.innerHTML="";

  let suhuArr = [];
  let waktuArr = [];

  let last = raw[raw.length-1];

  // 🔥 REALTIME CARD
  document.getElementById("suhu").innerText = last.suhu + " °C";
  document.getElementById("hum").innerText = last.hum + " %";
  document.getElementById("gas").innerText = last.gas + (last.gas > 600 ? " (BAHAYA)" : " (AMAN)");

  let gasCard = document.getElementById("gasCard");

  if(last.gas > 600){
    gasCard.classList.add("danger");
    gasCard.classList.remove("safe");

    // 🔔 ALERT
    console.log("⚠️ GAS BAHAYA!");
  } else {
    gasCard.classList.add("safe");
    gasCard.classList.remove("danger");
  }

  data.slice(-20).forEach(d=>{
    table.innerHTML+=`
    <tr>
    <td>${d.waktu}</td>
    <td>${d.suhu}</td>
    <td>${d.hum}</td>
    <td>${d.gas}</td>
    </tr>`;

    suhuArr.push(d.suhu);
    waktuArr.push(d.waktu);
  });

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "line",
    data: {
      labels: waktuArr,
      datasets: [{
        label: "Suhu (Avg 10)",
        data: suhuArr
      }]
    },
    options: {
      plugins: {
        zoom: {
          zoom: {
            wheel: { enabled: true },
            pinch: { enabled: true },
            mode: 'x'
          },
          pan: {
            enabled: true,
            mode: 'x'
          }
        }
      }
    }
  });

 });
}

// 🔄 AUTO REFRESH
loadData();
setInterval(loadData, 3000);

</script>

</body>
</html>
