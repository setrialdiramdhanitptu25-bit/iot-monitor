<!DOCTYPE html>
<html>
<head>
  <title>IoT Air Monitoring</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body style="background:#0f172a;color:white;font-family:Arial">

<h2>Dashboard Monitoring Udara</h2>

<button onclick="control('START')">START</button>
<button onclick="control('STOP')">STOP</button>
<button onclick="control('RESET')">RESET</button>

<canvas id="chart"></canvas>

<h3>Data Table</h3>
<table border="1" id="table"></table>

<script>

// ✅ SUDAH DIGANTI
const sheetURL = "https://opensheet.elk.sh/1gWWiBahN4xX77jh8J0RvxgnPdZQxAEfSRPCHPi7x6p4/Sheet1";

// ✅ SCRIPT KAMU
const scriptURL = "https://script.google.com/macros/s/AKfycbz-U9RmhG1ZhpFb4UMSbdxlgs_nO2xwIAORl6G2VwLebiYKQuwDfJTfK16uJawpnll4eQ/exec";

function warnaStatus(status) {
  if (status.includes("Baik")) return "green";
  if (status.includes("Sedang")) return "yellow";
  if (status.includes("Tidak Sehat (Sensitif)")) return "orange";
  if (status.includes("Tidak Sehat")) return "red";
  if (status.includes("Sangat Tidak Sehat")) return "purple";
  return "maroon";
}

let chart;

async function fetchData() {

  let res = await fetch(sheetURL);
  let data = await res.json();

  let labels = [];
  let temp = [];
  let hum = [];
  let gas = [];

  let table = `
  <tr>
    <th>No</th>
    <th>Time</th>
    <th>Temp</th>
    <th>Hum</th>
    <th>Gas_Level</th>
    <th>Status</th>
  </tr>`;

  data.forEach(row => {

    labels.push(row.Time);
    temp.push(row.Temp);
    hum.push(row.Hum);
    gas.push(row.Gas_Level);

    table += `
    <tr>
      <td>${row.No}</td>
      <td>${row.Time}</td>
      <td>${row.Temp}</td>
      <td>${row.Hum}</td>
      <td>${row.Gas_Level}</td>
      <td style="color:${warnaStatus(row.Status)}">${row.Status}</td>
    </tr>`;
  });

  document.getElementById("table").innerHTML = table;

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: 'Temp', data: temp },
        { label: 'Hum', data: hum },
        { label: 'Gas', data: gas }
      ]
    }
  });
}

async function control(cmd) {
  await fetch(scriptURL + "?action=" + cmd);
}

setInterval(fetchData, 5000);

</script>

</body>
</html>
